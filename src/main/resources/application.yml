server:
  port: 8080

spring:
  application:
    name: serviflow-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5433/serviflow
    username: serviflow
    password: serviflow_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0

# JWT Configuration
jwt:
  secret: serviflow-jwt-secret-key-2024-must-be-at-least-256-bits-long-for-hs256
  expiration: 900000  # 15 minutes in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

# CORS Configuration
cors:
  allowed-origins: http://localhost:4200,http://localhost:8080,http://10.0.2.2:8080,http://10.0.2.2:4200
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Logging
logging:
  level:
    com.serviflow: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG